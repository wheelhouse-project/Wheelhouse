# Build the graphical installer (WheelHouse-Setup.exe) and attach it to a release.
#
# This runs in the PUBLIC repo. It compiles the Inno Setup wizard
# (installer/WheelHouse-Setup.iss) into WheelHouse-Setup.exe and uploads it to an
# already-published GitHub release, so releases/latest/download/WheelHouse-Setup.exe
# serves the newest build (whichever release the author marked "latest").
#
# WHY IT TRIGGERS ON A PUBLISHED RELEASE, NOT A TAG PUSH
# ------------------------------------------------------
# The wizard bundles the engine (install-wheelhouse.ps1). The engine committed at
# the repo ROOT is deliberately UNSTAMPED: it carries the literal <ARCHIVE-SHA256>
# placeholder because it ships inside the app archive and cannot contain that
# archive's own hash (a fixed-point paradox). The engine that has the real archive
# hash and the release version stamped in is produced by `export_release.py
# --package` and uploaded by the release author as a release ASSET, alongside the
# app archive. So the release author's flow is:
#
#   1. run  export_release.py --package  -> app archive + STAMPED install-wheelhouse.ps1
#   2. gh release create vX.Y.Z ... --draft  (or the web UI)
#   3. upload BOTH files (archive + stamped engine) to that release
#   4. publish the release  ->  this workflow fires
#
# The workflow then downloads the STAMPED engine from the release, compiles the
# .exe against it, and uploads the .exe back to the same release. Bundling the
# committed placeholder engine instead would make every end-user install abort at
# the archive integrity check (wh-build-exe-review.3), so a guard below refuses to
# build if the downloaded engine still holds the placeholder.
#
# The version is passed to ISCC as a BARE /DAppVer define. Quoting it makes pwsh
# hand ISCC literal backslash-quotes, which becomes an invalid VersionInfoVersion
# and fails every compile (wh-build-exe-review.1). A bare /D value is never
# numeric-collapsed; only a numeric literal written in .iss source is.
#
# CODE SIGNING (Azure Artifact Signing; wh-installer-signing-decision)
# --------------------------------------------------------------------
# The exe is signed with Azure Artifact Signing (account wheelhouse-signing,
# certificate profile wheelhouse-public, East US). Auth is GitHub OIDC through
# this repo's "signing" environment: azure/login exchanges the job's OIDC token
# for an Azure session -- no stored credential anywhere. Signing happens AT ISCC
# COMPILE TIME via Inno's SignTool directive, NOT on the built exe afterward:
# the embedded uninstaller (unins000.exe) can only be signed during compilation
# (SignedUninstaller defaults to yes once SignTool is set), and an unsigned
# uninstaller would re-create the exact Defender false-positive problem signing
# exists to fix (wh-setup-defender-fp: unsigned zero-reputation builds get
# ML-flagged as Trojan:Win32/Bearfoos.B!ml).
#
# Because this workflow checks out the RELEASE TAG, the committed .iss at an
# older tag cannot be assumed to carry a SignTool directive. So the prepare
# step PATCHES the checked-out .iss (inserts SignTool=artifactsign under
# [Setup]) instead of relying on the script -- one mechanism that works
# identically for every tag, past and future. Forks build unsigned (their
# "signing" environment has no secrets); in the canonical repo a missing
# signing configuration FAILS the build rather than silently shipping an
# unsigned exe. Every action is pinned to a full commit SHA
# (wh-build-exe-review.6): signing a tampered action's output would just sign
# the tamper.

name: Build installer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for -- the leading v is required (e.g. v1.2.3). The release must already carry the stamped install-wheelhouse.ps1 asset.'
        required: true

permissions:
  contents: write        # download the stamped engine + upload the exe asset
  id-token: write        # OIDC token for azure/login (code signing)

concurrency:
  group: build-installer-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false   # never cancel a release build partway through

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    # The "signing" environment holds AZURE_CLIENT_ID / AZURE_TENANT_ID /
    # AZURE_SUBSCRIPTION_ID and scopes the OIDC subject the Entra federated
    # credential trusts (repo:...:environment:signing). Referencing it from a
    # fork is harmless: the fork's environment has no secrets, SIGNING_ENABLED
    # resolves false, and the build proceeds unsigned.
    environment: signing
    env:
      GH_TOKEN: ${{ github.token }}
      SIGNING_ENABLED: ${{ secrets.AZURE_CLIENT_ID != '' && github.repository == 'wheelhouse-project/WheelHouse' }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Pin to the release tag so a workflow_dispatch re-run rebuilds the
          # EXACT tagged wizard, not the current branch tip. A bare checkout
          # resolves to the tag on release: published but to the selected branch
          # on a manual re-run, which would pair the current wizard with the old
          # stamped engine and --clobber the known-good asset
          # (wh-build-exe-review.10).
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Resolve release tag and version
        id: rel
        shell: pwsh
        run: |
          # Strict error handling: a cmdlet failure terminates the step. Native
          # command failures stay on the explicit $LASTEXITCODE checks
          # ($PSNativeCommandUseErrorActionPreference pinned $false; wh-build-exe-review.21).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = '${{ github.event.release.tag_name }}'
          if (-not $tag) { $tag = '${{ inputs.tag }}' }
          if (-not $tag) { throw 'No release tag resolved (release event or workflow_dispatch tag input required).' }
          # Require the leading v BEFORE stripping it. The shipped engine builds
          # its default archive URL as .../releases/download/v<version>/..., so a
          # tag without the leading v (e.g. 1.2.3) would pass a numeric-only check
          # yet ship an installer whose default download URL 404s
          # (wh-build-exe-review.9).
          if ($tag -notmatch '^v\d+(\.\d+){1,3}$') {
            throw "Tag '$tag' must be a v-prefixed numeric version like v1.2.3. The installer's default archive URL is built as .../download/v<version>/..., so a tag without the leading v ships an installer that 404s (wh-build-exe-review.9)."
          }
          $version = $tag -replace '^v', ''
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Building installer for $tag (version $version)"

      - name: Require signing configuration in the canonical repo
        shell: pwsh
        run: |
          # In wheelhouse-project/WheelHouse an unsigned build must never reach
          # the release: Defender's ML heuristics delete unsigned zero-reputation
          # installers on end-user machines (wh-setup-defender-fp), so a silently
          # unsigned upload is worse than a failed build. Fail fast if the
          # signing environment lost its secrets. Forks are exempt and build
          # unsigned.
          if ('${{ github.repository }}' -eq 'wheelhouse-project/WheelHouse' -and $env:SIGNING_ENABLED -ne 'true') {
            throw 'Code signing is not configured (the "signing" environment is missing AZURE_CLIENT_ID); refusing to build an unsigned installer in the canonical repo. See wh-installer-signing-decision.'
          }
          Write-Host "Signing enabled: $env:SIGNING_ENABLED"

      - name: Install Inno Setup 6
        shell: pwsh
        # Pin an Inno Setup version that actually exists on the Chocolatey
        # community feed. 6.7.3 is a real upstream release but is NOT packaged on
        # Chocolatey (the feed tops out at 6.7.1), so pinning it failed this step
        # on every build before anything compiled (wh-build-exe-review.12). Bump
        # this only to a version confirmed installable from the feed.
        run: choco install innosetup --version=6.7.1 -y --no-progress

      - name: Fetch the stamped engine from the release
        shell: pwsh
        run: |
          # Strict error handling: a cmdlet failure terminates the step. Native
          # command failures stay on the explicit $LASTEXITCODE checks
          # ($PSNativeCommandUseErrorActionPreference pinned $false; wh-build-exe-review.21).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = '${{ steps.rel.outputs.tag }}'
          $version = '${{ steps.rel.outputs.version }}'
          # Download the STAMPED engine (release asset) beside the wizard. installer/
          # already holds WheelHouse-Setup.iss (shipped by the manifest); the engine
          # lands next to it so the wizard's bare-sibling Source path resolves.
          gh release download $tag --repo '${{ github.repository }}' --pattern 'install-wheelhouse.ps1' --dir installer --clobber
          # A failed native command does NOT fail a pwsh step on its own; check
          # explicitly so a download failure reports its real cause (network,
          # auth, rate limit, missing release) rather than falling through to the
          # missing-asset message below (wh-build-exe-review.8).
          if ($LASTEXITCODE -ne 0) { throw "gh release download failed (exit $LASTEXITCODE) for '$tag' -- likely a network, auth, rate-limit, or missing-release problem, not a missing asset." }
          $engine = Join-Path 'installer' 'install-wheelhouse.ps1'
          if (-not (Test-Path $engine)) { throw "The release '$tag' has no install-wheelhouse.ps1 asset; upload the stamped installer before publishing." }
          $text = Get-Content $engine -Raw
          # Guard wh-build-exe-review.3: refuse to bundle the unstamped placeholder engine.
          if ($text -match '<ARCHIVE-SHA256>') {
            throw "The release's install-wheelhouse.ps1 still holds the <ARCHIVE-SHA256> placeholder: it is the unstamped engine. Upload the export_release.py --package output (the stamped installer) to the release, then re-run."
          }
          # Guard the version: the stamped engine must target this exact release.
          $verPattern = '\$AppVersion\s*=\s*"' + [regex]::Escape($version) + '"'
          if ($text -notmatch $verPattern) {
            throw "The release's engine `$AppVersion does not match tag version $version. Re-stamp for $version and re-upload."
          }
          Write-Host "Stamped engine verified for version $version."

      - name: Verify the app archive matches the stamped engine
        shell: pwsh
        run: |
          # Strict error handling: a cmdlet failure terminates the step. Native
          # command failures stay on the explicit $LASTEXITCODE checks
          # ($PSNativeCommandUseErrorActionPreference pinned $false; wh-build-exe-review.21).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = '${{ steps.rel.outputs.tag }}'
          $version = '${{ steps.rel.outputs.version }}'
          # wh-build-exe-review.13: the engine only carries the archive's hash; the
          # earlier guards never proved the archive itself exists and is correct on
          # the release. A stamped engine paired with a missing, wrong, or corrupt
          # wheelhouse-<version>.zip passed every guard, ISCC built, the exe was
          # attached, and then every default end-user install 404s or aborts at the
          # integrity check. Verify here -- BEFORE compilation -- that the archive
          # the installer will download exists and its bytes match the hash stamped
          # into the engine.
          $engine = Join-Path 'installer' 'install-wheelhouse.ps1'
          $text = Get-Content $engine -Raw
          $shaMatches = [regex]::Matches($text, '\$DefaultArchiveSha256\s*=\s*"([0-9a-fA-F]{64})"')
          if ($shaMatches.Count -ne 1) {
            throw "Expected exactly one 64-hex `$DefaultArchiveSha256 in the stamped engine; found $($shaMatches.Count). The engine is not correctly stamped (wh-build-exe-review.13)."
          }
          $expected = $shaMatches[0].Groups[1].Value.ToLower()
          gh release download $tag --repo '${{ github.repository }}' --pattern "wheelhouse-$version.zip" --dir archive --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release download failed for wheelhouse-$version.zip (exit $LASTEXITCODE); the required app archive asset is missing or unreachable on release '$tag' (wh-build-exe-review.13)." }
          $zip = Join-Path 'archive' "wheelhouse-$version.zip"
          if (-not (Test-Path $zip)) { throw "The release '$tag' has no wheelhouse-$version.zip asset; publish the app archive before building the installer (wh-build-exe-review.13)." }
          $actual = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) {
            throw "App archive SHA256 mismatch: the stamped engine expects $expected but wheelhouse-$version.zip hashes to $actual. Re-stamp and re-upload so the engine and archive agree (wh-build-exe-review.13)."
          }
          Write-Host "App archive verified against the stamped engine ($expected)."

      - name: Azure sign-in for code signing (OIDC, no stored secret)
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare code signing
        if: env.SIGNING_ENABLED == 'true'
        id: signprep
        shell: pwsh
        run: |
          # Signing runs INSIDE the ISCC compile (Inno SignTool directive) so the
          # embedded uninstaller is signed too -- see the header note. This step
          # stages everything the compile's sign command needs:
          #   1. the Azure signing dlib (signtool plug-in) from the pinned
          #      Microsoft.Trusted.Signing.Client NuGet package,
          #   2. the newest Windows SDK signtool.exe on the runner (dlib support
          #      needs 10.0.2261.755+; current runner SDKs are far newer),
          #   3. a metadata.json naming the signing account + certificate profile
          #      (not secrets -- auth is the azure/login OIDC session, which the
          #      dlib reaches through DefaultAzureCredential -> AzureCliCredential;
          #      ManagedIdentityCredential is excluded so the credential probe
          #      does not stall on the runner's absent IMDS endpoint),
          #   4. the .iss patch: insert SignTool=artifactsign under [Setup] in the
          #      TAG-checked-out script (older tags predate signing, so the
          #      committed script cannot be relied on -- the patch works for every
          #      tag uniformly). SignedUninstaller defaults to yes once SignTool
          #      is set, which is exactly what we want.
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 -x -OutputDirectory signing-client -NonInteractive
          if ($LASTEXITCODE -ne 0) { throw "nuget install Microsoft.Trusted.Signing.Client failed (exit $LASTEXITCODE)." }
          $dlib = Join-Path $env:GITHUB_WORKSPACE 'signing-client\Microsoft.Trusted.Signing.Client\bin\x64\Azure.CodeSigning.Dlib.dll'
          if (-not (Test-Path $dlib)) { throw "Azure.CodeSigning.Dlib.dll not found at $dlib; the NuGet package layout changed." }
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe' -ErrorAction SilentlyContinue |
            Sort-Object { [version]$_.Directory.Parent.Name } | Select-Object -Last 1
          if (-not $signtool) { throw 'No Windows SDK signtool.exe found on the runner.' }
          Write-Host "Using signtool: $($signtool.FullName)"
          $metadata = Join-Path $env:GITHUB_WORKSPACE 'signing-client\metadata.json'
          @'
          {
            "Endpoint": "https://eus.codesigning.azure.net",
            "CodeSigningAccountName": "wheelhouse-signing",
            "CertificateProfileName": "wheelhouse-public",
            "ExcludeCredentials": ["ManagedIdentityCredential"]
          }
          '@ | Set-Content -Path $metadata -Encoding utf8
          $iss = 'installer\WheelHouse-Setup.iss'
          $content = Get-Content $iss -Raw
          $setupHeaders = [regex]::Matches($content, '(?m)^\[Setup\]')
          if ($setupHeaders.Count -ne 1) { throw "Expected exactly one [Setup] section in $iss; found $($setupHeaders.Count). Refusing to patch." }
          if ($content -match '(?mi)^\s*SignTool\s*=') { throw "$iss already carries a SignTool directive; the build-time patch would double it. Update this workflow to match the script." }
          $content = $content -replace '(?m)^\[Setup\]', "[Setup]`r`nSignTool=artifactsign"
          Set-Content -Path $iss -Value $content -Encoding utf8 -NoNewline
          Write-Host 'Patched SignTool=artifactsign into the [Setup] section.'
          # The sign command ISCC will run for Setup.exe and the uninstaller.
          # $q is Inno's escape for a double quote inside a sign tool command;
          # $f is the file being signed. Both must reach ISCC literally.
          $cmd = '$q' + $signtool.FullName + '$q sign /v /fd SHA256 /tr http://timestamp.acs.microsoft.com /td SHA256 /dlib $q' + $dlib + '$q /dmdf $q' + $metadata + '$q $f'
          "signcmd=$cmd" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Compile installer
        shell: pwsh
        env:
          SIGN_CMD: ${{ steps.signprep.outputs.signcmd }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          # BARE /DAppVer define (see the header note on wh-build-exe-review.1).
          $args = @(
            "/O$dist",
            "/FWheelHouse-Setup",
            "/DAppVer=${{ steps.rel.outputs.version }}"
          )
          if ($env:SIGNING_ENABLED -eq 'true') {
            if (-not $env:SIGN_CMD) { throw 'Signing is enabled but the prepare step produced no sign command.' }
            # One argument: /Sartifactsign=<command>. pwsh quotes the whole
            # argument for ISCC; Inno expands $q/$f inside the command itself.
            $args += "/Sartifactsign=$($env:SIGN_CMD)"
          }
          $args += "installer\WheelHouse-Setup.iss"
          & $iscc @args
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Verify the signature
        if: env.SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          # Prove the exe that is about to be uploaded really is signed, chains
          # to a trusted root, is timestamped (mandatory: Artifact Signing certs
          # live ~72 hours, so an untimestamped signature dies with the cert),
          # and names the expected subject. A signing misconfiguration must fail
          # HERE, not on an end-user machine.
          $ErrorActionPreference = 'Stop'
          $exe = 'dist\WheelHouse-Setup.exe'
          $sig = Get-AuthenticodeSignature -FilePath $exe
          if ($sig.Status -ne 'Valid') { throw "Signature status on $exe is '$($sig.Status)' ($($sig.StatusMessage)); expected Valid." }
          if (-not $sig.TimeStamperCertificate) { throw "The signature on $exe carries no timestamp; it would expire with the short-lived certificate." }
          if ($sig.SignerCertificate.Subject -notmatch 'David Chesley Hite III') { throw "Unexpected signer subject: $($sig.SignerCertificate.Subject)" }
          Write-Host "Signed by: $($sig.SignerCertificate.Subject)"
          Write-Host "Thumbprint: $($sig.SignerCertificate.Thumbprint)"
          Write-Host "Timestamped by: $($sig.TimeStamperCertificate.Subject)"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: WheelHouse-Setup-exe
          path: dist/WheelHouse-Setup.exe
          if-no-files-found: error

      - name: Attach the installer to the release
        shell: pwsh
        run: |
          # Run under strict error handling so a cmdlet failure -- e.g. ConvertFrom-Json
          # on unparseable `gh release view` output that still exited 0 -- TERMINATES the
          # step instead of falling through with $existing = $null to the "no existing
          # asset" branch, which would --clobber the published installer with no backup
          # (wh-build-exe-review.21). Native command failures are deliberately kept OFF
          # this terminating path: $PSNativeCommandUseErrorActionPreference = $false is
          # the pwsh 7.6 default, but it is pinned here so a future default flip cannot
          # make a failed `gh release upload --clobber` throw before the explicit
          # $LASTEXITCODE check below, which would bypass the backup-restore logic and
          # leave the release with no installer (wh-build-exe-review.14/.15).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = '${{ steps.rel.outputs.tag }}'
          $repo = '${{ github.repository }}'
          $asset = 'WheelHouse-Setup.exe'
          $new = "dist/$asset"
          # Only ADD the asset to the release the author already published; never
          # create or publish a release here, so the workflow cannot move the
          # "latest" pointer (wh-build-exe-review.4 / .5).
          #
          # gh release upload --clobber DELETES the existing same-name asset before
          # uploading its replacement. If that upload then fails (a transient
          # network/API error on a re-run), the previous installer is gone and the
          # stable download URL 404s (wh-build-exe-review.14). Back up the currently
          # published installer first and restore it if the new upload fails, so a
          # failed re-run never leaves the release with no installer.
          #
          # A backup download that fails for a TRANSIENT reason must NOT be mistaken
          # for "no existing asset" -- that would run the destructive --clobber with
          # nothing to restore (wh-build-exe-review.15). So first query the release
          # asset metadata to learn whether the installer already exists; only then
          # decide whether a backup is required.
          $assetsRaw = gh release view $tag --repo $repo --json assets
          if ($LASTEXITCODE -ne 0) {
            throw "Could not query release '$tag' assets (exit $LASTEXITCODE) before replacing the installer; refusing to run the destructive --clobber blind (wh-build-exe-review.15)."
          }
          $existing = ($assetsRaw | ConvertFrom-Json).assets | Where-Object { $_.name -eq $asset } | Select-Object -First 1
          $haveBackup = $false
          if ($existing) {
            # The installer already exists on this release. A validated backup is
            # MANDATORY before the destructive replacement; if it cannot be made,
            # refuse to replace rather than risk losing the last good installer.
            $backupDir = 'asset-backup'
            New-Item -ItemType Directory -Force -Path $backupDir | Out-Null
            gh release download $tag --repo $repo --pattern $asset --dir $backupDir --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "The release already publishes $asset but backing it up failed (exit $LASTEXITCODE); refusing to replace it so a failed upload cannot lose the last good installer. Re-run when the backup can be fetched (wh-build-exe-review.15)."
            }
            $backup = Join-Path $backupDir $asset
            if (-not (Test-Path $backup)) {
              throw "The backup download reported success but produced no $asset; refusing to replace the published installer (wh-build-exe-review.15)."
            }
            $expectedSize = [int64]$existing.size
            $actualSize = (Get-Item $backup).Length
            if ($expectedSize -gt 0 -and $actualSize -ne $expectedSize) {
              throw "The backup of $asset is incomplete ($actualSize bytes; the release reports $expectedSize); refusing to replace the published installer with an unverifiable backup (wh-build-exe-review.15)."
            }
            $haveBackup = $true
            Write-Host "Backed up the currently-published $asset ($actualSize bytes) before replacing it."
          } else {
            Write-Host "No existing $asset on release '$tag'; this is the first upload."
          }
          gh release upload $tag $new --repo $repo --clobber
          if ($LASTEXITCODE -ne 0) {
            if ($haveBackup) {
              Write-Host "New upload failed; restoring the previous installer so the stable URL keeps working."
              gh release upload $tag $backup --repo $repo --clobber
              if ($LASTEXITCODE -ne 0) {
                throw "The new installer upload FAILED and restoring the previous installer ALSO failed; the release '$tag' may have no installer at its stable URL -- manual recovery required (wh-build-exe-review.14)."
              }
              throw "The new installer upload failed; the previously-published installer was restored. Investigate and re-run (wh-build-exe-review.14)."
            }
            throw "gh release upload failed (exit $LASTEXITCODE) and there was no previous installer to restore; the release '$tag' has no installer attached (wh-build-exe-review.7)."
          }
          Write-Host "Installer attached to release $tag."
