# WheelHouse Unified Pattern Configuration
#
# This file contains ALL speech patterns - both commands and text replacements.
# Patterns are processed in file order, with first match winning.
#
# SCHEMA:
# - pattern: Regex pattern (case-insensitive)
#   * ^ anchor at start = Must match from beginning of utterance (fullmatch mode)
#   * $ anchor at end = Must match to end of utterance
#   * No ^ anchor = Can match mid-utterance (search mode)
# - position: "leading" (default) or "trailing". Trailing-position commands
#   (wh-2vz) fire when the word is the LAST word of an utterance; the words
#   BEFORE it are inserted as dictation, and the trailing word itself is
#   stripped from the transcription. v1 only supports single-word literal
#   trailing patterns (e.g. "submit"). The escape hatch for dictating the
#   trailing word as text is the existing "literal (.+)$" pattern.
# - requires_hotword: Boolean, whether pattern needs "x-ray" prefix (default: false)
# - actions: Array of {function, params, awaits_done?} action steps
#
# ORDERING RULES:
# 1. Commands with ^ anchor checked before replacements without ^ anchor
# 2. More specific patterns before generic patterns
# 3. Patterns with longer trigger phrases before shorter ones
#
# FILE FORMAT: TOML (Tom's Obvious Minimal Language)
# Parsed using Python's built-in tomllib module (Python 3.11+)

# =============================================================================
# GLOBAL CONFIGURATION
# =============================================================================

# Hotword for command activation - must be the first word in 
# the utterance to trigger command mode for those the commands that require it.
# Must not be two words or a hyphenated word
COMMAND_HOTWORD = "x-ray"

# =============================================================================
# COMMANDS - Special Bypass
# =============================================================================

# Literal bypass - insert text without any pattern processing
# Must come FIRST to prevent "literal X" from matching other patterns.
# This is also the escape hatch for trailing-position commands below:
# "literal submit" inserts the word "submit" as text instead of firing Enter.
[[pattern]]
pattern = '''literal (.+)$'''
actions = [
    { function = "insert_text", params = ["g1"] }
]

# =============================================================================
# COMMANDS - Trailing-position (wh-2vz)
# =============================================================================

# Trailing-position commands fire when the word is the LAST word of an
# utterance. The words BEFORE the trailing word are inserted as dictation;
# the trailing word itself is NOT inserted. v1 supports single-word literals.
#
# "submit" -> press Enter. Example: dictating "hello world submit" inserts
# "hello world" then presses Enter. Dictating just "submit" alone presses
# Enter without inserting anything.
[[pattern]]
pattern = '''submit'''
position = "trailing"
actions = [
    { function = "press_keys", params = ["enter"] }
]

