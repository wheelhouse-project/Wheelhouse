# =============================================================================
# COMMANDS - Speech Mode
# =============================================================================

[[pattern]]
pattern = '''^push to talk mode$'''
actions = [
    { function = "set_speech_interaction_mode", params = ["push_to_talk"] }
]

[[pattern]]
pattern = '''^click to talk mode$'''
actions = [
    { function = "set_speech_interaction_mode", params = ["toggle"] }
]

# Voice element clicking (wh-vjwdl). Hotword-required: "click" is a common
# dictation word, so without requires_hotword a dictated "click here..." would
# be parsed as a click command. MUST stay AFTER the exact "click to talk mode"
# entry above so first-match-wins lets that specific command win.
# The forward-to-Input execution lands in slice wh-tab7j; this slice only
# parses g1 into an ElementQuery.
[[pattern]]
pattern = '''^click\s+(.+)$'''
actions = [
    { function = "click_element", params = ["g1"], awaits_done = true }
]

# Numbered-overlay toggle (wh-n29v.17). Hotword-gated, matching the
# "click <name>" style. Anchored "^show numbers$" / "^hide numbers$" so they
# do not start with "click" and never collide with the broad click pattern
# above. The action delegates to LogicController.handle_overlay_command, which
# applies SHOW_NUMBERS / HIDE_NUMBERS to the overlay state machine and hands
# the returned effects to the integration stub seam (wh-h9a8v2).
[[pattern]]
pattern = '''^apply numbers$'''
requires_hotword = false
actions = [
    { function = "show_overlay_command", awaits_done = true }
]

[[pattern]]
pattern = '''^dismiss numbers$'''
requires_hotword = false
actions = [
    { function = "hide_overlay_command", awaits_done = true }
]

# =============================================================================
# COMMANDS/REPLACEMENTS - Wrapping Operations
# =============================================================================
#
# Smart wrapping patterns with simplified behavior:
#
# Replacements (no ^ anchor, optional capture) - Wrap text OR insert empty
#    Example: "parentheses hello" → inserts "(hello)"
#    Example: "parentheses" → inserts "()"
#    Uses: wrap_or_insert function with fence characters
#
# ORDERING: Commands (^) checked before replacements (no ^) due to pattern priority
#
# =============================================================================

# -----------------------------------------------------------------------------
# Parentheses
# -----------------------------------------------------------------------------

[[pattern]]
pattern = '''\bparentheses(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ["(", ")", "g1"] }
]

# -----------------------------------------------------------------------------
# Angle Brackets
# -----------------------------------------------------------------------------

[[pattern]]
pattern = '''\bangle brackets(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ["<", ">", "g1"] }
]

# -----------------------------------------------------------------------------
# Square Brackets
# -----------------------------------------------------------------------------

[[pattern]]
pattern = '''\bbrackets(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ["[", "]", "g1"] }
]

# -----------------------------------------------------------------------------
# Curly Braces
# -----------------------------------------------------------------------------

[[pattern]]
pattern = '''\bbraces(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ["{", "}", "g1"] }
]

# -----------------------------------------------------------------------------
# Quotation Marks
# -----------------------------------------------------------------------------

[[pattern]]
pattern = '''\bsingle quotes?(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ["'", "'", "g1"] }
]

[[pattern]]
pattern = '''\bquotes?(.*)$'''
requires_hotword = false
actions = [
    { function = "wrap_or_insert", params = ['"', '"', "g1"] }
]

