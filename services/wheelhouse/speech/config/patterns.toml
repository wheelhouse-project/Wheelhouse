# =============================================================================
# COMMANDS - Window Activation
# =============================================================================

[[pattern]]
pattern = '''^activates? (.+)$'''
requires_hotword = true
actions = [
    { function = "activate", params = ["g1"] }
]

# "default_browser" is a reserved target: the activate action resolves it to
# the default browser's executable (from the Windows registry) at the moment
# the command is spoken, falling back to msedge.exe if the lookup fails.
[[pattern]]
pattern = '''^browser$'''
requires_hotword = true
actions = [
    { function = "activate", params = ["default_browser"] }
]

[[pattern]]
pattern = '''^notepad$'''
requires_hotword = true
actions = [
    { function = "activate", params = ["notepad.exe"] }
]

# =============================================================================
# COMMANDS - Basic Editing
# =============================================================================

# Item-number pattern: "item one" -> "1.", "item 5" -> "5."
# Must begin utterance (^ anchor) to trigger command buffering
[[pattern]]
pattern = '''^item (\d+)$'''
actions = [
    { function = "number_point", params = ["g1"] }
]

# delete word must come BEFORE delete N to avoid "word" being captured as invalid number
[[pattern]]
pattern = '''^delete word$'''
actions = [
    { function = "hk", params = ["ctrl", "left"], awaits_done = true },
    { function = "hk", params = ["shift", "ctrl", "right"], awaits_done = true },
    { function = "hk", params = ["del"], awaits_done = true }
]

[[pattern]]
pattern = '''^delete\s*(\d+)?$'''
actions = [
    { function = "press", params = ["del", "g1"] }
]

[[pattern]]
pattern = '''^back ?space\s*(\d+)?$'''
actions = [
    { function = "press", params = ["backspace", "g1"] }
]

[[pattern]]
pattern = '''^(tab|indent)\s+(\d+)$'''
actions = [
    { function = "press", params = ["tab", "g2"] }
]

[[pattern]]
pattern = '''^(shift tab|outdent)$'''
actions = [
    { function = "hk", params = ["shift", "tab"] }
]

# Generic keystroke command - executes arbitrary key combinations
# Examples: "press enter", "press control alt delete", "press F5"
# Key order doesn't matter: "press delete control" = "press control delete"
[[pattern]]
pattern = '''^press\s*(.+)$'''
actions = [
    { function = "press_keys", params = ["g1"] }
]

# Insert raw text at cursor without intelligent insertion.
# No prefix space, no capitalization, no TextPerfector, no letter buffering.
# Requires hotword for safety (avoids accidental insertion during dictation).
# Examples: "insert hello world", "insert @example.com", "insert TODO:"
#
# wh-qoyk9: this pattern intentionally has no awaits_done. Logic emits
# end_utterance immediately after dispatching insert_raw, which then
# schedules a deferred clipboard restore via PendingRestore (wh-d0lr1)
# rather than relying on a synchronous restore inside the input process.
# Adding awaits_done here would block end_utterance on the IPC ack, which
# is unnecessary and would slow the next dictation. The deferred-restore
# mechanism is itself race-free and ownership-aware (Win32 clipboard
# sequence number check at fire time), so the previous slow-target race
# the no-awaits_done choice exposed is no longer a concern.
[[pattern]]
pattern = '''^insert\s*(.+)$'''
actions = [
    { function = "insert_raw", params = ["g1"] }
]

# "submit" lives in the trailing-position section near the top of this
# file (wh-2vz). The previous leading-position entry was removed when
# the trailing entry was added; a leading + trailing pair would
# silently pre-empt the trailing intercept in single-word utterances.

[[pattern]]
pattern = '''^escape$'''
actions = [
    { function = "press", params = ["esc"] }
]

[[pattern]]
pattern = '''\bnew ?line\b'''
actions = [
    { function = "hk", params = ["shift", "enter"] }
]

[[pattern]]
pattern = '''\bnew ?paragraph\b'''
actions = [
    { function = "hk", params = ["shift", "enter", 2] }
]

 
